Dimension Name: Page Name

Description: |
  A title name assigned to a page or screen view, used to categorize content consumption and navigation behavior across digital properties. It typically represents the logical page label shown in reporting rather than the raw URL, enabling consistent analysis across dynamic URLs, query parameters, and localized variants.

