Dimension Name: Page Type
Formula: CASE WHEN page_template IS NOT NULL THEN page_template WHEN page_url LIKE '%/product/%' OR content_group = 'pdp' THEN 'product-detail' WHEN page_url LIKE '%/category/%' OR content_group = 'plp' THEN 'category-listing' WHEN page_url LIKE '%/search%' THEN 'search-results' WHEN page_url LIKE '%/cart%' THEN 'cart' WHEN page_url LIKE '%/checkout%' THEN 'checkout' WHEN page_url IN ('/','/home') OR page_name = 'home' THEN 'home' WHEN page_url LIKE '%/blog/%' OR content_type = 'article' THEN 'article' WHEN page_url LIKE '%/account%' THEN 'account' WHEN page_url LIKE '%/support%' OR page_url LIKE '%/help%' THEN 'support' ELSE 'other' END

Description: |
  Categorises a page or screen into a standardized content or functional type based on its purpose in the user journey, such as home, category, product detail, article, search results, cart, checkout, account, or support. This dimension enables consistent analysis of engagement, conversion, and navigation performance across templates and experiences.

Category: Engagement


Industry: Retail

Priority: Medium

Core Area: content taxonomy; site structure; navigation; content grouping; page classification; subsection; information architecture

Scope: Event

Data Type: string

Aggregation Window: Event, Session, User, Time based - Hourly/Daily/Monthly/Yearly

GA4 Event: |
  sub_section_1

Adobe Event: |
  eVar12 or any available eVar

