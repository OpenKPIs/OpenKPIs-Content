XDM Mapping: |
  {
  "xdmPath":"_experience.analytics.customDimensions.eVars.eVar12",
  "alternateMappings":
  ["web.webPageDetails.siteSection","_experience.analytics.event1to100.event1"],
  "sourceField":"page.subSection1"
  }

SQL Query: |
  SELECT
    event_date,
    user_pseudo_id,
    event_timestamp,
    COALESCE(
      (SELECT ep.value.string_value FROM UNNEST(event_params) ep WHERE ep.key = 'sub_section_1'),
      REGEXP_EXTRACT((SELECT ep.value.string_value FROM UNNEST(event_params) ep WHERE ep.key = 'page_location'), r'^https?://[^/]+/[^/]+/([^/?#]+)'),
      '(not set)'
    ) AS sub_section_1
  FROM `project.dataset.events_*`
  WHERE event_name IN ('page_view','screen_view','view_item','select_content');

Calculation Notes: |
  Populate at the time of page_view, screen_view, and any key content interaction events so the value persists across downstream analysis. Prefer CMS-driven taxonomy over URL parsing because URLs can change and may not reflect business structure. Standardise casing and naming conventions, such as title case or lowercase, to avoid duplicate values. If using SPA frameworks, ensure the dimension is refreshed on virtual page changes. For Adobe, use an eVar with visit or hit expiration depending on reporting needs; hit-level is recommended when subsection can change frequently within a session. Avoid sending free-form values from user input. Define a fallback value such as '(not set)' only when taxonomy is unavailable.

Business Use Case: |
  A content strategy team filters engagement and conversion reports by Sub Section 1 to compare how Blog, Documentation, Pricing, and Support subsections contribute to lead generation, product adoption, or revenue. An e-commerce team uses it to compare performance of Men, Women, Kids, and Sale subsections within a broader catalog section.

Dependencies:
  Dimensions: [screen_view, page_location, page_path, content_taxonomy, site_section]
  KPIs: [page_view]

Source Data: Digital Analytics; CMS; Tag Management System; Business Intelligence

Report Attributes: |
