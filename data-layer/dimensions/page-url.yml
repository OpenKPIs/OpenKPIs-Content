SQL Query: |
  SELECT
    event_date,
    event_timestamp,
    user_pseudo_id,
    (SELECT ep.value.string_value FROM UNNEST(event_params) ep WHERE ep.key = 'page_location') AS page_url,
    COUNT(*) AS page_views
  FROM `project.dataset.events_*`
  WHERE event_name = 'page_view'
  GROUP BY 1,2,3,4;

Calculation Notes: |
  1) Capture on every page_view event after URL normalization rules are applied. 
  2)Define whether query parameters are retained, partially retained, or stripped to avoid cardinality explosion. 
  3)Strip URL fragments (#) because they are client-side only and often not analytically meaningful. 
  4) Standardize lowercase hostnames and protocol handling. 
  5) For SPAs, ensure virtual page views update the URL and fire a page_view on route change. 
  6) Exclude internal tools, preview environments, and localhost traffic where applicable. 
  7) Avoid collecting sensitive query parameters such as email, phone, account IDs, tokens, or health/financial identifiers. 
  8) If canonical URL differs from browser URL, document whether this dimension stores observed URL, canonical URL, or both.

Business Use Case: |
  Marketing and product teams use Page URL to identify which exact landing pages drive the highest engagement, conversion rate, and revenue, such as comparing performance of /pricing versus /enterprise/pricing across paid and organic traffic.

