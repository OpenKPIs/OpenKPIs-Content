Dimension Name: Page URL
Formula: Observed page location captured at page_view event time. Recommended normalized form: LOWER(REGEXP_REPLACE(page_location, '#.*$', '')) with optional query-string handling based on governance rules.

Description: |
  The full canonical or observed URL of the page viewed, used to categorise content consumption, landing experiences, navigation paths, and on-site performance by exact page location. This dimension typically includes protocol, hostname, path, and may include query parameters depending on implementation rules.

Category: Engagement


Industry: Retail

Priority: High

Core Area: Digital Analytics

Scope: Event

Data Type: string

Aggregation Window: Event, Session, User, Time based - Hourly/Daily/Monthly/Yearly

GA4 Event: |
  page_location

Adobe Event: |
  eVar3, prop3
  Can use any eVar and prop or any other dimension

