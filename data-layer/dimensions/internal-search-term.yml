  Dimensions: Internal Search Term, Search Results Count, Search Type, Landing Page, Device Category; 
  Metrics: Searches, Users, Sessions, Search Exit Rate, Conversion Rate, Revenue, Add-to-Cart Rate; 
  KPIs: Search-to-Conversion Rate, Zero-Result Search Rate

