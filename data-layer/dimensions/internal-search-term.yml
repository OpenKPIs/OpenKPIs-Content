Dimension Name: Internal Search Term
Formula: Captured directly from the internal site search input field at the time a search_results_view or equivalent internal search event fires. If you want to capture from URL here is the formula LOWER(TRIM(URL_DECODE(search_query_parameter))).

Description: |
  The exact keyword or phrase a user enters into an on-site or in-app search function. This dimension categorizes search interactions by the user's expressed intent and is used to analyze content/product discoverability, navigation effectiveness, and demand signals within owned digital properties.

Category: Engagement


Industry: Retail

Priority: High

Core Area: Digital Analytics

Scope: Event

Data Type: string

Aggregation Window: Event,  Session,  User,  Time based - Hourly/Daily/Monthly/Yearly

GA4 Event: |
  search_term

Adobe Event: |
  eVar12, prop12 or can be any available eVar or prop
  

