XDM Mapping: |
  {
    "eventType": "siteSearch",
    "_experience": {
      "analytics": {
        "customDimensions": {
          "eVars": {
            "eVar12": "running shoes"
          },
          "props": {
            "prop12": "running shoes"
          }
        }
      }
    },
    "siteSearch": {
      "phrase": "running shoes",
      "isInternal": true,
      "resultsCount": 128
    }
  }

SQL Query: |
  SELECT
    event_date,
    event_timestamp,
    user_pseudo_id,
    session_id,
    (SELECT ep.value.string_value FROM UNNEST(event_params) ep WHERE ep.key = 'search_term') AS internal_search_term
  FROM `project.dataset.events_*`
  WHERE event_name IN ('view_search_results','search_results_view')
    AND (SELECT ep.value.string_value FROM UNNEST(event_params) ep WHERE ep.key = 'search_term') IS NOT NULL;

Calculation Notes: |
  1) Capture when search results are rendered or when the search is submitted, depending on implementation standard, but use one method consistently. 
  2) Prefer the submitted term over auto-suggest text unless measuring suggestion interactions separately. 
  3) Normalise casing and whitespace for reporting consistency, but retain raw value in a separate field if possible. 
  4) Exclude external site search engines and paid search keywords. 
  5) If search terms are passed in the URL, ensure decoding and parameter governance across templates. 
  6) Consider language handling, stemming, stop-word treatment, and typo correction only in downstream reporting layers, not by overwriting the raw captured term. 
  7) Do not capture sensitive health, financial, or personal data entered into search unless approved by governance and privacy teams. Implement bot filtering and deduplicate       repeated searches caused by page reloads or SPA route changes."
  

Business Use Case: |
  An e-commerce merchandising team filters sessions by Internal Search Term = 'running shoes' to evaluate search exit rate, product click-through, add-to-cart rate, and revenue generated from users expressing high purchase intent for that category.
  

Dependencies:
  Events: [view_search_results, search_refinement_event]
  Metrics: [search_results_count]

Source Data: Digital Analytics, Business Intelligence

