Dimension Name: Registration Type

Description: |
  Categorises the method, pathway, or account model used when a user completes registration or sign-up. Typical values include email, social login, SSO, phone, invite-only, guest-to-account, free trial, paid account, provider referral, or offline-assisted registration. This dimension is used to compare conversion quality, onboarding performance, and downstream retention by registration pathway.

Category: Conversion


























