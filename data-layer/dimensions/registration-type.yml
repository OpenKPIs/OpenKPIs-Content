SQL Query: |
  SELECT
    user_id,
    event_timestamp,
    CASE
      WHEN LOWER(COALESCE(sso_provider, '')) <> '' THEN CONCAT('sso:', LOWER(sso_provider))
      WHEN LOWER(COALESCE(social_provider, '')) <> '' THEN CONCAT('social:', LOWER(social_provider))
      WHEN COALESCE(phone_verified, FALSE) = TRUE THEN 'phone'
      WHEN COALESCE(guest_conversion, FALSE) = TRUE THEN 'guest-to-account'
      WHEN invite_code IS NOT NULL THEN 'invite'
      WHEN LOWER(COALESCE(registration_channel, '')) = 'offline' THEN 'offline-assisted'
      ELSE 'email'
    END AS registration_type
  FROM raw_events
  WHERE event_name IN ('sign_up','complete_registration','account_created');

Calculation Notes: |
  1) Capture on the definitive registration completion event, not on form start. 
  2)Standardise values to a controlled taxonomy and lowercase format. 
  3) Avoid mixing provider and method unless intentionally designed, e.g. social:google vs sso:okta. 
  4) Persist as a user-scoped property after first successful registration for longitudinal analysis, but also retain event-scoped value on the registration event for auditability. If a user retries multiple methods before success, only store the successful method on the completion event. 
  5) Do not populate with raw email domains or identifiers. Align guest-to-account logic with commerce account merge rules.

Business Use Case: |
  Growth and product teams compare conversion rate, activation rate, and 90-day retention for users who registered via email versus social:google versus sso:okta to determine which registration pathways drive the highest quality users and where onboarding friction exists.

