Dimension Name: Registration Type
Formula: Derived from the registration submission context using a prioritised mapping of identity method and registration source. Example logic: CASE WHEN sso_provider IS NOT NULL THEN CONCAT('sso:', LOWER(sso_provider)) WHEN social_provider IS NOT NULL THEN CONCAT('social:', LOWER(social_provider)) WHEN phone_verified = TRUE THEN 'phone' WHEN guest_conversion = TRUE THEN 'guest-to-account' WHEN invite_code IS NOT NULL THEN 'invite' WHEN registration_channel = 'offline' THEN 'offline-assisted' ELSE 'email' END

Description: |
  Categorises the method, pathway, or account model used when a user completes registration or sign-up. Typical values include email, social login, SSO, phone, invite-only, guest-to-account, free trial, paid account, provider referral, or offline-assisted registration. This dimension is used to compare conversion quality, onboarding performance, and downstream retention by registration pathway.

Category: Conversion


Industry: Retail

Priority: High

Core Area: Digital Analytics

Scope: User

Data Type: string

Aggregation Window: Event, Session, User, Time based - Daily/Monthly/Yearly

