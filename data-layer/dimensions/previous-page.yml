SQL Query: |
  WITH pageviews AS (
    SELECT
      user_pseudo_id,
      CONCAT(user_pseudo_id, '-', CAST(ga_session_id AS STRING)) AS session_id,
      event_timestamp,
      (SELECT value.string_value FROM UNNEST(event_params) WHERE key = 'page_location') AS current_page,
      (SELECT value.string_value FROM UNNEST(event_params) WHERE key = 'page_title') AS current_page_title,
      (SELECT value.string_value FROM UNNEST(event_params) WHERE key = 'page_referrer') AS page_referrer
    FROM `project.dataset.events_*`
    WHERE event_name = 'page_view'
  )
  SELECT
    user_pseudo_id,
    session_id,
    event_timestamp,
    current_page,
    current_page_title,
    COALESCE(
      LAG(current_page) OVER (PARTITION BY session_id ORDER BY event_timestamp),
      page_referrer,
      '(entrance)'
    ) AS previous_page
  FROM pageviews;

Calculation Notes: |
  1) Prefer an internal previous page value derived from ordered page_view events rather than relying solely on browser referrer, because referrer may include external domains, be suppressed by privacy settings, or be overwritten by redirects. Standardise whether this dimension stores full URL, path only, page title, or canonical page ID. 
  2) Exclude query strings if they create unnecessary cardinality unless campaign/content parameters are analytically required. 
  3) For SPAs, ensure virtual page views fire on route change so previous page reflects in-app navigation. 
  4) Define a consistent entrance value such as '(entrance)' for first pageviews in session. If using GA4 page_referrer, note it may represent browser referrer rather than strictly prior internal page.

Business Use Case: |
  A content team analyses article pages by Previous Page to identify which homepage modules, category pages, or related-article links most often drive readers into high-engagement content. A CRO team uses it to see which page users came from before reaching checkout and where abandonment is introduced.

