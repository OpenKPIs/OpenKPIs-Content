Dimension Name: Previous Page
Formula: For each page_view event within a session ordered by event timestamp: Previous Page = LAG(current_page_identifier) OVER (PARTITION BY user/session ORDER BY event_timestamp). If the current page_view is the first page in the session, set value to '(entrance)' or null based on reporting standard.

Description: |
  The page URL, path, title, or canonical page identifier viewed immediately before the current page within the same session. This dimension categorises navigation flow by identifying the prior step in a user's on-site journey and is commonly used to analyse pathing, entry-to-content progression, internal click behaviour, and page-to-page drop-off.

Category: Engagement


Industry: Retail

Priority: High

Core Area: Digital Analytics

Scope: Event

Data Type: string

Aggregation Window: Event, Session, User, Time based - Hourly/Daily/Monthly/Yearly

GA4 Event: |
  page_referrer

Adobe Event: |
  prop5 or any available prop

