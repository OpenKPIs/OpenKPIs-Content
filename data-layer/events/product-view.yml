Event Name: Product View
Event Serialization: No

Description: |
  The event is triggered when a user views a Product Detail Page (PDP). It is a primary indicator of a user's interest in a product or piece of merchandise and helps analyze product-level engagement when combined with other events.

Category: Engagement


Industry: E-commerce

Priority: High

Core Area: Digital Analytics

Scope: Event

Event Type: standard

Aggregation Window: Event

GA4 Event: |
  view_item

Adobe Event: |
  prodView

W3 Data Layer: |
  window.digitalData = {
    "product": [{
      "productInfo": {
        "productID": "SKU-99812-B",
        "productName": "ZenFlow Eco-Mat"
      },
      "category": { "primaryCategory": "Fitness" },
      "attributes": { "color": "Sage Green" }
    }]
  };

GA4 Data Layer: |
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    "event": "view_item",
    "ecommerce": {
      "currency": "USD",
      "value": 85.00, // The total value of the items viewed
      "items": [{
        "item_id": "SKU-99812-B",
        "item_name": "ZenFlow Eco-Mat",
        "index": 0, // Helpful for tracking position in a list
        "item_brand": "ZenFlow",
        "item_category": "Fitness",
        "item_category2": "Yoga",
        "item_variant": "Sage Green",
        "price": 85.00,
        "quantity": 1
      }]
    }
  });

Adobe Client Data Layer: |
  window.adobeDataLayer = window.adobeDataLayer || [];
  window.adobeDataLayer.push({
    "event": "product:view", // Custom event string for the Launch Trigger
