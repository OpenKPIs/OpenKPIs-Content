Parameters: |
  GA4 Parameter: item_id, item_name, price, item_category, item_brand
  Adobe ACDL Key: sku, name, price, category, brand
  Adobe XDM Path: productListItems[].sku, productListItems[].name, productListItems[].priceTotal, productListItems[].productCategories[].name, productListItems[].brand




Source Data: Digital Analytics, Product Information Management (PIM)

