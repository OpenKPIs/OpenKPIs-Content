KPI Name: ORDER_CONVERSION_RATE_Visit
Formula: Order Conversion Rate = (Total Orders ÷ Total Sessions) × 100

Description: |
  Indicates the efficiency of your website or app in converting sessions or users into completed orders. A higher rate reflects better funnel performance and user experience.

Category: Conversion


Industry: [["E-commerce"]]

Priority: High

Core Area: Conversion Funnel Performance

Scope: Session

Measure Type: Ratio

Aggregation Window: Daily, Weekly, Monthly

GA4 Event: |
  purchase, session_start
  

Adobe Event: |
  purchase, OOTB Metrics
  


