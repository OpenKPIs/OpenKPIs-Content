SQL Query: |
  sql
  WITH base AS (
  SELECT DATE(event_timestamp) AS event_date,
  COUNT(DISTINCT CASE WHEN event_name = 'purchase' THEN order_id END) AS orders,
  COUNT(DISTINCT CASE WHEN event_name = 'session_start' THEN session_id END) AS sessions
  FROM ecommerce_events
  GROUP BY event_date)
  SELECT event_date,
     (orders * 100.0 / sessions) AS order_conversion_rate
     FROM base
     ORDER BY event_date;
  

Calculation Notes: |
  1) Ensure both orders and sessions are from the same date range.
  2) Remove test traffic.
  3) Segment by channel or device where applicable.
  4) Keep consistency in attribution windows.
  


Dependencies:
  Events: [product_view, add_to_cart implemented consistently]
  Dimensions: [Traffic dimensions: source, medium, campaign for marketing breakdowns]


Report Attributes: |
  Percentage (0–100%), typically shown as % with one decimal place; breakdown by product, category, device, channel, campaign, country, etc.

Dashboard Usage: [Ecommerce Funnel Dashboard (view → add to cart → checkout → purchase), Product Merchandising / PDP Performance, A/B Test Results (PDP layout, recommendations, pricing, images), Channel/Campaign Effectiveness dashboards.]

Segment Eligibility: |
  1) Sessions with product_view (base population).
  2) High vs. low ATC-rate segments for products, categories, campaigns.
  3) Users frequently viewing but rarely adding to cart (low-intent browsers).
  4) Users who add to cart often but rarely purchase (friction/price-sensitive segments).



