KPI Name: Order Conversion Rate (Visitor)
Formula: Order Conversion Rate = (Total Orders ÷ Total Users) × 100

Description: |
  Measures the rate at which users or visitors convert into completed orders. It helps in capturing the effectiveness of website or app in converting visitors to customers
  

Category: Conversion


Industry: [["Retail, E-commerce, Other"]]

Priority: High

Core Area: Conversion Funnel Performance

Scope: User



















