Metric Name: Product View
Formula: Product View = COUNT of product view events

Description: |
  Counts the number of times a product is viewed either as a widget across the site/app or on product detail view. This metric is foundational for understanding product interest, merchandising effectiveness, and the top of the commerce conversion funnel. It helps teams evaluate product discovery and the relationship between product exposure and downstream actions such as add-to-cart, checkout, and purchase.

Category: Engagement


Industry: Retail, E-commerce

Priority: High

Core Area: Digital Analytics

Scope: Event

Measure Type: Counter

Aggregation Window: Event, User, Session, Daily, Monthly, Weekly, Yearly

