Metric Name: Add to cart
Formula: SUM(CASE WHEN event_name = 'add_to_cart' THEN COALESCE(quantity, 1) ELSE 0 END)

Description: |
  Counts the number of times a user adds one or more products to the shopping cart. This metric is a key mid-funnel conversion indicator because it reflects purchase intent, product interest, and merchandising effectiveness before checkout begins.

Category: Conversion


Industry: Retail, E-commerce

Priority: High

Core Area: Digital Analytics


Measure Type: Counter

Aggregation Window: Session, User, Hourly, Weekly, Yearly

