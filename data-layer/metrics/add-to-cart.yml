SQL Query: |
  "SELECT
    DATE(event_timestamp) AS event_date,
    COUNT(*) AS add_to_cart_events,
    SUM(COALESCE(quantity, 1)) AS add_to_cart,
    COUNT(DISTINCT user_id) AS users_with_add_to_cart,
    COUNT(DISTINCT session_id) AS sessions_with_add_to_cart
  FROM raw_digital_events
  WHERE event_name = 'add_to_cart'
  GROUP BY 1
  ORDER BY 1;"
  

Calculation Notes: |
  1) Use the add_to_cart event only. The primary metric should sum item quantity when available; 
  2)if quantity is missing, default to 1 per event. 
  3)Exclude duplicate events caused by page reloads, tag firing retries, or server/client double collection by deduplicating on event_id where available. 
  4)If multiple items are sent in one event, sum all item quantities. 
  5) For product-level reporting, attribute counts to each item in the items array. 
  6) For session or user rollups, count distinct sessions or users with at least one add_to_cart separately from total add-to-cart quantity. 
  7)Exclude test traffic, internal traffic, and bot traffic. 
  8)Ensure canceled cart actions are not netted out unless a separate net cart adds metric is defined.

Business Use Case: |
  Merchandising, product, and growth teams use this metric to evaluate product detail page effectiveness, promotional impact, pricing sensitivity, and traffic quality. It helps identify high-intent products, diagnose funnel drop-off before checkout, and compare campaign landing pages by downstream shopping behavior.

