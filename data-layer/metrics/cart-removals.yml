Metric Name: Cart Removals
Formula: Cart Removals = COUNT(remove_from_cart events)

Description: |
  Counts the number of times an item is removed from the shopping cart. Each qualifying event represents a user action that decreases cart quantity or removes a line item from the cart.
  • The metric helps quantify cart abandonment behavior at the product-interaction level.
  • Identify friction in pricing or shipping expectations.
  • Helps in evaluating merchandise, promotion, and checkout experience effectiveness.

Category: Conversion


Industry: Retail, E-commerce

Priority: High

Core Area: Digital Analytics

Scope: Event

Measure Type: Counter

Aggregation Window: Event, Session, User, Daily, Weekly, Monthly, Hourly, Yearly

