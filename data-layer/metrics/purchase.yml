SQL Query: |
  SELECT
    DATE(event_timestamp) AS event_date,
    COUNT(DISTINCT transaction_id) AS purchase
  FROM raw_events
  WHERE event_name = 'purchase'
    AND transaction_id IS NOT NULL
    AND COALESCE(event_status, 'completed') = 'completed'
  GROUP BY 1
  ORDER BY 1;

Calculation Notes: |
  1) Deduplicate by transaction_id to avoid double-counting from page reloads, duplicate tags, server/client dual collection, or retries. 
  2) Include only completed purchase events and exclude test orders, internal traffic, canceled transactions logged as purchases, and zero-value sandbox transactions unless business rules explicitly include them. 
  3) If transaction_id is unavailable, use a fallback deduplication key such as order_id plus user_pseudo_id plus event_date, but this is less reliable. 
  4) Refunds should not reduce this metric; track them separately. 
  5)For multi-currency implementations, purchase count is unaffected, but ensure transaction completion logic is consistent across regions.
  

Business Use Case: |
  Used by e-commerce, growth, product, and executive teams to monitor sales volume, evaluate checkout funnel performance, compare channel quality, assess merchandising and pricing changes, and forecast demand. It is also a core input to conversion rate, average order value, revenue per user, and campaign ROI reporting.

