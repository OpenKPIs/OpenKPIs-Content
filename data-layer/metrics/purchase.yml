Metric Name: Purchase
Formula: Purchase = COUNT(DISTINCT transaction_id) for completed purchase events

Description: |
  Counts of completed purchase transactions captured in digital analytics. This metric measures how many orders were successfully placed and is a foundational conversion KPI for evaluating checkout effectiveness, campaign performance, merchandising impact, and revenue generation.

Category: Conversion


Industry: Retail, E-commerce, Technology, Other

Priority: High

Core Area: Digital Analytics

Scope: Event

Measure Type: Counter

Aggregation Window: Event, Session, User, Daily, Weekly, Monthly, Yearly

