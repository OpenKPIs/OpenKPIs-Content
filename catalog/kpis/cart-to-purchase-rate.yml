# KPI: Cart-to-Purchase Rate
# Generated: 2026-05-13T19:17:29.810Z
# Contributed by: devyendar-maganti


KPI Name: Cart-to-Purchase Rate
Formula: SELECT 100.0 * COUNT(DISTINCT CASE WHEN purchase_session = 1 THEN session_id END) / NULLIF(COUNT(DISTINCT session_id), 0) AS cart_to_purchase_rate FROM (SELECT session_id, MAX(CASE WHEN event_name = 'add_to_cart' THEN 1 ELSE 0 END) AS has_add_to_cart, MAX(CASE WHEN event_name = 'purchase' THEN 1 ELSE 0 END) AS purchase_session FROM events GROUP BY session_id) s WHERE has_add_to_cart = 1;

Description: |
  Cart-to-Purchase Rate measures the percentage of distinct sessions in which a user adds at least one item to the cart and subsequently completes a purchase within the same session. This KPI evaluates checkout conversion efficiency by quantifying how effectively cart creation activity translates into completed orders.

Category: Checkout

Tags: [cart, conversion, checkout]
























