KPI Name: Pages Per Session
Formula: Total Pageviews ÷ Total Sessions

Description: |
  Pages per session measures the average number of pages visited during a single, continuous visit to a website.

Category: Engagement


Industry: [["Retail, E-commerce, SaaS, Media, Technology"]]

Priority: Medium

Core Area: Digital Analytics

Scope: User

Measure Type: Average

Aggregation Window: Session, Hourly, Daily, Monthly, Yearly

GA4 Event: |
  page_view

Adobe Event: |
  page_view

W3 Data Layer: |
  {
    "page_view": {
      "type": "event"
    }
  }

GA4 Data Layer: |
  {
    "eventType": "page_view"
  }

Adobe Client Data Layer: |
  {
    "eventType": "page_view"
  }

XDM Mapping: |
  {
    "eventType": "page_view"
  }

SQL Query: |
  SELECT SUM(page_views) / COUNT(DISTINCT session_id) AS pages_per_session FROM sessions_data

Calculation Notes: |
  Exclude sessions with zero page views to avoid division by zero errors.

Business Use Case: |
  Marketing teams can use this KPI to assess the effectiveness of content and navigation structure, aiming to increase user engagement.

Dependencies:
  Events: [page_view]
  Dimensions: [session_data]

Source Data: Digital Analytics

Report Attributes: |
  Page Views, Sessions
  

