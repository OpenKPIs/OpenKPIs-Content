KPI Name: Orders
Formula: Orders = COUNT(DISTINCT order_id)

Description: |
  Indicates the number purchases or transactions successfully completed an individual customer or all customers during a selected time period.

Category: Conversion


Industry: [["E-commerce"]]

Priority: High

Core Area: Digital analytics, Business intelligence

Scope: Global

Measure Type: Counter

Aggregation Window: Session, User, Time based - Hourly/Daily/Monthly/Yearly

