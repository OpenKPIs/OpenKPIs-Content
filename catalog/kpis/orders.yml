SQL Query: |
  SELECT COUNT(DISTINCT order_id) AS total_orders, DATE(event_timestamp) AS order_date
  FROM ecommerce_events
  WHERE event_name = 'purchase'
  GROUP BY order_date
  ORDER BY order_date;

Calculation Notes: |
  1️⃣ Filter duplicate transactions by unique order_id.
  2️⃣ Exclude test or internal transactions via predefined filters.
  3️⃣ Consider refunds or cancellations as adjustments in Orders and downstream Revenue KPIs to report actual business impacting metrics.

Business Use Case: |
  1️⃣ Marketing Attribution & ROI: Identify which campaigns actually drive orders & revenue versus those that just drive "window shopping" (traffic)
  2️⃣ Inventory & Supply Chain Management: Order volume over time allows businesses to predict future demand and avoid "Stockouts" or overstocking
  3️⃣ Customer Loyalty & Retention Analysis: 
  4️⃣ Product Performance: identify high-interest items that convert or failed to convert due to price, reviews, or poor descriptions etc.,
  5️⃣ Product Finding Methods: Analyze which site features like internal search, category menus, or recommendation widgets are most effective at leading users to a final purchase.

